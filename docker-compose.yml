services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ghostgraph_data:/app/data
    environment:
      DATABASE_URL: sqlite:////app/data/ghostgraph.db
      GHOSTGRAPH_VECTOR_DB_PATH: /app/data/vectordb
      OLLAMA_HOST: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  ghostgraph_data:
