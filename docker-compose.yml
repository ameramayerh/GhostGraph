
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/vectordb:/app/vectordb
      - ./backend/database_v2.db:/app/database_v2.db
    environment:
      - HOST=0.0.0.0
      - OLLAMA_HOST=http://host.docker.internal:11434

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
